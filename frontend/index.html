<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay — Enterprise CRM + Chat</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

  <!-- ===================== AUTH SCREEN ===================== -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <h1 class="brand">Relay</h1>
      <p class="brand-sub">Enterprise CRM + Chat</p>

      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Log in</button>
        <button class="tab-btn" data-tab="register">Create organization</button>
      </div>

      <!-- Login -->
      <form id="loginForm" class="auth-form">
        <label>Email</label>
        <input type="email" id="loginEmail" required placeholder="you@company.com" />
        <label>Password</label>
        <input type="password" id="loginPassword" required placeholder="••••••••" />
        <button type="submit" class="primary-btn">Log in</button>
        <p class="error-msg" id="loginError"></p>
      </form>

      <!-- Register organization -->
      <form id="registerForm" class="auth-form hidden">
        <label>Organization name</label>
        <input type="text" id="regOrgName" required placeholder="Acme Inc." />
        <label>Your name</label>
        <input type="text" id="regDisplayName" required placeholder="Jane Doe" />
        <label>Your email</label>
        <input type="email" id="regEmail" required placeholder="you@company.com" />
        <label>Password</label>
        <input type="password" id="regPassword" required minlength="8" placeholder="min 8 characters" />
        <button type="submit" class="primary-btn">Create organization &amp; sign up</button>
        <p class="error-msg" id="registerError"></p>
      </form>
    </div>
  </div>

  <!-- ===================== MAIN APP (shown right after login/signup) ===================== -->
  <div id="appShell" class="app-shell hidden">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand-mini">Relay</div>
        <div class="org-name" id="orgNameLabel"></div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="chat">💬 Chat</button>
        <button class="nav-item" data-view="contacts">👤 Contacts</button>
        <button class="nav-item" data-view="leads">🎯 Leads</button>
        <button class="nav-item" data-view="deals">💼 Deals</button>
        <button class="nav-item" data-view="users">🧑‍🤝‍🧑 Team</button>
      </nav>

      <div class="sidebar-footer">
        <div class="me">
          <div class="me-name" id="meName">—</div>
          <div class="me-email" id="meEmail">—</div>
        </div>
        <button id="logoutBtn" class="link-btn">Log out</button>
      </div>
    </aside>

    <!-- ---------------- CHAT VIEW (default) ---------------- -->
    <main class="view" id="view-chat">
      <section class="chat-list">
        <div class="chat-list-header">
          <h2>Conversations</h2>
          <button id="newDmBtn" class="icon-btn" title="New direct message">＋ DM</button>
          <button id="newGroupBtn" class="icon-btn" title="New group">＋ Group</button>
        </div>
        <div id="conversationList" class="conversation-list"></div>
      </section>

      <section class="chat-main">
        <div class="chat-main-header">
          <div id="chatTitle">Select a conversation</div>
          <div id="chatPresence" class="presence-dot"></div>
        </div>
        <div id="messageList" class="message-list"></div>
        <form id="messageForm" class="message-form hidden">
          <input type="text" id="messageInput" autocomplete="off" placeholder="Type a message…" />
          <button type="submit" class="primary-btn">Send</button>
        </form>
      </section>
    </main>

    <!-- ---------------- Simple stub views for the other modules ---------------- -->
    <main class="view hidden" id="view-contacts"><div class="stub">Contacts CRM view — coming in the next build phase.</div></main>
    <main class="view hidden" id="view-leads"><div class="stub">Leads CRM view — coming in the next build phase.</div></main>
    <main class="view hidden" id="view-deals"><div class="stub">Deals CRM view — coming in the next build phase.</div></main>
    <main class="view hidden" id="view-users"><div class="stub">Team management view — coming in the next build phase.</div></main>
  </div>

  <!-- Modals -->
  <div id="modalBackdrop" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <span id="modalTitle">New</span>
        <button class="link-btn" id="modalClose">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
