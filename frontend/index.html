<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Relay — Internal Comms</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  :root{
    --ink:#0E1420;
    --panel:#141B2B;
    --panel-2:#1B2436;
    --line: rgba(255,255,255,0.08);
    --text:#E7EAF2;
    --text-dim:#8A93A6;
    --accent:#FFB454;       /* signal amber — "you have something to see" */
    --accent-dim:#8A6431;
    --online:#4ADE80;
    --radius:10px;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  @font-face{font-family:'Inter';src:local('Inter');}
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--ink); color:var(--text); height:100vh; overflow:hidden;}
  .mono{font-family:'JetBrains Mono','SF Mono',Consolas,monospace;}

  /* ---------- Auth screen ---------- */
  #auth{
    height:100vh; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,180,84,0.06), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(255,180,84,0.04), transparent 40%),
      var(--ink);
  }
  .auth-card{width:380px; padding:36px 32px; background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);}
  .auth-brand{display:flex; align-items:center; gap:10px; margin-bottom:28px;}
  .auth-brand .mark{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,var(--accent),#C97A2E);flex-shrink:0;}
  .auth-brand span{font-size:18px; font-weight:600; letter-spacing:-0.01em;}
  .auth-tag{color:var(--text-dim); font-size:13px; margin-bottom:24px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;}
  .field input{width:100%; background:var(--panel-2); border:1px solid var(--line); border-radius:8px; padding:11px 12px; color:var(--text); font-size:14px; outline:none; transition:border-color .15s;}
  .field input:focus{border-color:var(--accent);}
  .btn{width:100%; padding:12px; border-radius:8px; border:none; background:var(--accent); color:#1a1206; font-weight:600; font-size:14px; cursor:pointer; margin-top:6px; transition:transform .1s, opacity .15s;}
  .btn:hover{opacity:0.92;}
  .btn:active{transform:scale(0.98);}
  .switch{margin-top:18px; font-size:13px; color:var(--text-dim); text-align:center;}
  .switch a{color:var(--accent); text-decoration:none; cursor:pointer;}
  .err{color:#F87171; font-size:13px; margin-top:10px; display:none;}

  /* ---------- App shell ---------- */
  #app{display:none; height:100vh; grid-template-columns:260px 1fr; }
  #app.active{display:grid;}

  #sidebar{background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column;}
  .sb-header{padding:18px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--line);}
  .sb-header .mark{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--accent),#C97A2E);}
  .sb-header span{font-weight:600; font-size:15px;}
  .sb-search{padding:12px 14px;}
  .sb-search input{width:100%; background:var(--panel-2); border:1px solid var(--line); border-radius:7px; padding:8px 10px; color:var(--text); font-size:13px; outline:none;}
  .sb-search input:focus{border-color:var(--accent);}
  .sb-section-label{padding:10px 16px 6px; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-dim);}
  .sb-list{overflow-y:auto; flex:1;}
  .sb-item{display:flex; align-items:center; gap:10px; padding:9px 16px; cursor:pointer; border-left:2px solid transparent;}
  .sb-item:hover{background:var(--panel-2);}
  .sb-item.active{background:var(--panel-2); border-left-color:var(--accent);}
  .avatar{width:30px;height:30px;border-radius:50%;background:#2A3448; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:var(--text-dim); flex-shrink:0; position:relative;}
  .avatar .dot{position:absolute; bottom:-1px; right:-1px; width:9px; height:9px; border-radius:50%; background:var(--text-dim); border:2px solid var(--panel);}
  .avatar .dot.online{background:var(--online);}
  .sb-item .meta{overflow:hidden;}
  .sb-item .name{font-size:13.5px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .sb-item .preview{font-size:12px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .sb-footer{padding:12px 16px; border-top:1px solid var(--line); display:flex; align-items:center; gap:10px;}
  .sb-footer .name{font-size:13px; font-weight:600;}
  .sb-footer .uname{font-size:11.5px; color:var(--text-dim);}
  .sb-footer button{margin-left:auto; background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:12px;}

  #main{display:flex; flex-direction:column; height:100vh;}
  #chat-header{padding:16px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px;}
  #chat-header .title{font-weight:600; font-size:15px;}
  #chat-header .sub{font-size:12px; color:var(--text-dim);}
  #empty-state{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-dim); gap:8px;}
  #empty-state .mark{width:40px;height:40px;border-radius:10px;background:var(--panel-2); margin-bottom:8px;}

  #messages{flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:2px;}
  .msg{display:flex; gap:10px; padding:6px 0; max-width:640px;}
  .msg .avatar{margin-top:2px;}
  .msg .bubble-wrap{flex:1;}
  .msg .row1{display:flex; align-items:baseline; gap:8px; margin-bottom:2px;}
  .msg .who{font-size:13.5px; font-weight:600;}
  .msg .time{font-size:11px; color:var(--text-dim);}
  .msg .content{font-size:14px; line-height:1.5; color:var(--text); word-wrap:break-word;}
  .msg.mine .who{color:var(--accent);}

  #typing-row{height:20px; padding:0 24px; font-size:12px; color:var(--text-dim); font-style:italic;}

  #composer{padding:14px 24px 20px; border-top:1px solid var(--line); display:flex; gap:10px; align-items:flex-end;}
  #composer textarea{flex:1; resize:none; background:var(--panel-2); border:1px solid var(--line); border-radius:9px; padding:11px 14px; color:var(--text); font-size:14px; font-family:inherit; outline:none; max-height:120px;}
  #composer textarea:focus{border-color:var(--accent);}
  #composer button{background:var(--accent); border:none; color:#1a1206; font-weight:600; padding:11px 18px; border-radius:9px; cursor:pointer; font-size:13.5px;}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--panel-2); border-radius:4px;}

  .new-dm-btn{margin:6px 16px 0; padding:7px 10px; font-size:12px; background:var(--panel-2); border:1px dashed var(--line); color:var(--text-dim); border-radius:7px; cursor:pointer; text-align:left;}
  .new-dm-btn:hover{color:var(--text); border-color:var(--accent-dim);}
</style>
</head>
<body>

<!-- ===== AUTH ===== -->
<div id="auth">
  <div class="auth-card">
    <div class="auth-brand"><div class="mark"></div><span>Relay</span></div>
    <div class="auth-tag" id="auth-tag">Sign in to your workspace.</div>

    <div id="login-form">
      <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="you@company.com" /></div>
      <div class="field"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" /></div>
      <button class="btn" onclick="doLogin()">Sign in</button>
      <div class="switch">New here? <a onclick="toggleAuth()">Create an account</a></div>
    </div>

    <div id="register-form" style="display:none">
      <div class="field"><label>Full name</label><input type="text" id="reg-name" placeholder="John Smith" /></div>
      <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="you@company.com" /></div>
      <div class="field"><label>Password</label><input type="password" id="reg-password" placeholder="Min. 8 characters" /></div>
      <button class="btn" onclick="doRegister()">Create account</button>
      <div class="switch">Already have an account? <a onclick="toggleAuth()">Sign in</a></div>
    </div>

    <div class="err" id="auth-err"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div id="sidebar">
    <div class="sb-header"><div class="mark"></div><span>Relay</span></div>
    <div class="sb-search"><input type="text" id="user-search" placeholder="Find a person…" oninput="searchUsers(this.value)" /></div>
    <div id="search-results"></div>
    <div class="sb-section-label">Conversations</div>
    <div class="sb-list" id="conv-list"></div>
    <div class="sb-footer">
      <div class="avatar" id="me-avatar"></div>
      <div>
        <div class="name" id="me-name"></div>
        <div class="uname mono" id="me-username"></div>
      </div>
      <button onclick="logout()">Sign out</button>
    </div>
  </div>

  <div id="main">
    <div id="chat-header" style="display:none">
      <div class="avatar" id="ch-avatar"></div>
      <div>
        <div class="title" id="ch-title"></div>
        <div class="sub" id="ch-sub"></div>
      </div>
    </div>
    <div id="empty-state">
      <div class="mark"></div>
      <div>Pick a person on the left, or search to start a new conversation.</div>
    </div>
    <div id="messages" style="display:none"></div>
    <div id="typing-row"></div>
    <div id="composer" style="display:none">
      <textarea id="msg-input" rows="1" placeholder="Message…" onkeydown="onComposerKey(event)"></textarea>
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8080/api/v1';
let state = { token: null, me: null, socket: null, activeConv: null, conversations: [], typingTimeout: null };

function toggleAuth(){
  const showingLogin = document.getElementById('login-form').style.display !== 'none';
  document.getElementById('login-form').style.display = showingLogin ? 'none' : 'block';
  document.getElementById('register-form').style.display = showingLogin ? 'block' : 'none';
  document.getElementById('auth-tag').textContent = showingLogin ? 'Set up your account.' : 'Sign in to your workspace.';
  document.getElementById('auth-err').style.display = 'none';
}
function showAuthErr(msg){ const e = document.getElementById('auth-err'); e.textContent = msg; e.style.display = 'block'; }

async function doRegister(){
  const displayName = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if(!displayName || !email || !password) return showAuthErr('Fill in every field to continue.');
  const res = await fetch(`${API}/auth/register`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({displayName, email, password}) });
  const data = await res.json();
  if(!res.ok) return showAuthErr(data.error || 'Could not create your account.');
  enterApp(data);
}
async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const res = await fetch(`${API}/auth/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
  const data = await res.json();
  if(!res.ok) return showAuthErr(data.error || 'Check your email and password.');
  enterApp(data);
}
function logout(){ state.socket?.close(); state = { token:null, me:null, socket:null, activeConv:null, conversations:[] }; document.getElementById('app').classList.remove('active'); document.getElementById('auth').style.display='flex'; }

function enterApp(data){
  state.token = data.accessToken;
  state.me = data.user;
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('me-name').textContent = state.me.displayName;
  document.getElementById('me-username').textContent = '@' + state.me.username;
  document.getElementById('me-avatar').textContent = initials(state.me.displayName);
  connectSocket();
  loadConversations();
}

function initials(name){ return name.split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase(); }
function authHeaders(){ return { 'Authorization': `Bearer ${state.token}`, 'Content-Type':'application/json' }; }

function connectSocket(){
  state.socket = io('http://localhost:8080', { auth: { token: state.token } });
  state.socket.on('chat:message', (msg) => {
    if(state.activeConv && msg.conversationId === state.activeConv.id) appendMessage(msg);
    loadConversations();
  });
  state.socket.on('chat:typing', ({conversationId, username, isTyping}) => {
    if(state.activeConv && conversationId === state.activeConv.id){
      document.getElementById('typing-row').textContent = isTyping ? `@${username} is typing…` : '';
    }
  });
  state.socket.on('presence:update', () => { renderConvList(); });
}

async function loadConversations(){
  const res = await fetch(`${API}/conversations`, { headers: authHeaders() });
  state.conversations = await res.json();
  renderConvList();
}

function renderConvList(){
  const list = document.getElementById('conv-list');
  list.innerHTML = '';
  state.conversations.forEach(c => {
    const el = document.createElement('div');
    el.className = 'sb-item' + (state.activeConv?.id === c.id ? ' active' : '');
    el.onclick = () => openConversation(c);
    el.innerHTML = `
      <div class="avatar">${initials(c.title.replace('@',''))}<div class="dot"></div></div>
      <div class="meta">
        <div class="name">${c.title}</div>
        <div class="preview">${c.lastMessage ? escapeHtml(c.lastMessage.content) : 'No messages yet'}</div>
      </div>`;
    list.appendChild(el);
  });
}

let searchDebounce;
function searchUsers(q){
  clearTimeout(searchDebounce);
  const box = document.getElementById('search-results');
  if(!q.trim()){ box.innerHTML=''; return; }
  searchDebounce = setTimeout(async () => {
    const res = await fetch(`${API}/users?search=${encodeURIComponent(q)}`, { headers: authHeaders() });
    const users = (await res.json()).filter(u => u.id !== state.me.id);
    box.innerHTML = '';
    users.slice(0,5).forEach(u => {
      const btn = document.createElement('div');
      btn.className = 'new-dm-btn';
      btn.textContent = `Message @${u.username}`;
      btn.onclick = async () => {
        const res = await fetch(`${API}/conversations/direct`, { method:'POST', headers: authHeaders(), body: JSON.stringify({ userId: u.id }) });
        const conv = await res.json();
        document.getElementById('user-search').value=''; box.innerHTML='';
        await loadConversations();
        const full = state.conversations.find(c => c.id === conv.id) || {...conv, title:'@'+u.username};
        openConversation(full);
      };
      box.appendChild(btn);
    });
  }, 250);
}

async function openConversation(conv){
  state.activeConv = conv;
  state.socket.emit('chat:join', { conversationId: conv.id });
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('chat-header').style.display = 'flex';
  document.getElementById('messages').style.display = 'flex';
  document.getElementById('composer').style.display = 'flex';
  document.getElementById('ch-title').textContent = conv.title;
  document.getElementById('ch-avatar').textContent = initials(conv.title.replace('@',''));
  document.getElementById('ch-sub').textContent = conv.type === 'DIRECT' ? 'Direct message' : 'Group';
  renderConvList();

  const res = await fetch(`${API}/conversations/${conv.id}/messages`, { headers: authHeaders() });
  const msgs = await res.json();
  const box = document.getElementById('messages');
  box.innerHTML = '';
  msgs.forEach(appendMessage);
}

function appendMessage(msg){
  const box = document.getElementById('messages');
  const mine = msg.senderId === state.me.id;
  const el = document.createElement('div');
  el.className = 'msg' + (mine ? ' mine' : '');
  const time = new Date(msg.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  el.innerHTML = `
    <div class="avatar">${initials(msg.sender?.displayName || '?')}</div>
    <div class="bubble-wrap">
      <div class="row1"><span class="who">@${msg.sender?.username || 'unknown'}</span><span class="time mono">${time}</span></div>
      <div class="content">${escapeHtml(msg.content)}</div>
    </div>`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function sendMessage(){
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if(!content || !state.activeConv) return;
  state.socket.emit('chat:send', { conversationId: state.activeConv.id, content }, (ack) => {
    if(ack?.error) alert(ack.error);
  });
  input.value = '';
  input.style.height = 'auto';
  state.socket.emit('chat:typing', { conversationId: state.activeConv.id, isTyping: false });
}

function onComposerKey(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); return; }
  if(state.activeConv){
    state.socket.emit('chat:typing', { conversationId: state.activeConv.id, isTyping: true });
    clearTimeout(state.typingTimeout);
    state.typingTimeout = setTimeout(() => state.socket.emit('chat:typing', { conversationId: state.activeConv.id, isTyping: false }), 1500);
  }
}

function escapeHtml(s){ const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
